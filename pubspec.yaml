name: hoshou_shindan_app
description: まもる計算 - 家族を守る保障額シミュレーター
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  uuid: ^4.4.0
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_secure_storage: ^9.2.4
  home_widget: ^0.7.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSansJP-Regular.ttf
